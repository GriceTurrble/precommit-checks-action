name: CD
permissions: write-all
on:
  push:
    branches: [main]

jobs:
  release:
    permissions:
      # Required in order to create releases and tags.
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: griceturrble/github-actions-cd-action@b09deb99c5fc89c5644feb3a30f28ed1a32536d7 # v1
