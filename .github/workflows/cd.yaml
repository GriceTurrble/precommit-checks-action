name: CD
permissions: write-all
on:
  push:
    branches: [main]

jobs:
  release:
    permissions:
      # Required in order to create releases and tags.
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: griceturrble/github-actions-cd-action@b09deb99c5fc89c5644feb3a30f28ed1a32536d7 # v1
